name: forge-ai

envFile: .envrc
artifactStorePath: .forge/artifact-store.yaml

# NOTE: Multi-engine aliases trigger config-validate errors ("cannot be resolved to single engine").
# This is a known forge config-validate limitation. The aliases work correctly at runtime.
engines:
  - alias: go-gen-openapi-with-license
    type: builder
    builder:
      - engine: go://go-gen-openapi
      - engine: go://generic-builder
        spec:
          command: bash
          args: ["./hack/add-license-headers.sh"]

  - alias: generate-mocks
    type: builder
    builder:
      - engine: go://generic-builder
        spec:
          command: "rm"
          args: ["-rf", "./internal/util/mocks"]
      - engine: go://go-gen-mocks

build:
  - name: generate-tracker-client
    src: ./api/forge-tracker.v1.yaml
    dest: ./pkg/generated/trackerclient
    engine: alias://go-gen-openapi-with-license
    spec:
      sourceFile: ./api/forge-tracker.v1.yaml
      destinationDir: ./pkg/generated
      client:
        enabled: true
        packageName: trackerclient

  - name: generate-mocks
    src: .
    engine: alias://generate-mocks

  # go-build uses forge's artifact store for lazy rebuilds; dependsOn is not needed.
  - name: forge-ai
    src: ./cmd/forge-ai
    dest: ./build/bin
    engine: go://go-build

test:
  - name: lint-tags
    runner: go://go-lint-tags

  - name: lint-licenses
    runner: go://go-lint-licenses

  - name: lint
    runner: go://go-lint

  - name: unit
    runner: go://go-test

  - name: integration
    runner: go://go-test
